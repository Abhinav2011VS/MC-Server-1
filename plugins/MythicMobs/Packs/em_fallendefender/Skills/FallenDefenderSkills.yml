fdefender_hp_check:
  Cooldown: 999
  Conditions:
  - playersinradius{a=>1;r=80} true
  Skills:
  - skill{s=fdefender_hp_checkB} @pir{r=80} #MODIFY THE RANGE TO CHECK FOR PLAYERS
# GUIDE TO CUSTOMIZE HEALTH SCALING
fdefender_hp_checkB:
  Conditions:
  Skills:
  - setvariable{var=skill.amount_targets;val=<skill.targets>}
  - setmaxhealth{amount=<caster.var.eichpee>+100*<skill.var.amount_targets>;mode=SCALE} @self
# AMOUNT = (BASE HEALTH DESIRED) + (ADDITIONAL NET HEALTH PER PLAYER IN RANGE, #Modify this#) * <skill.var.amount_targets>
# (That is just the variable for number of players, don't touch it.)

fdefenderstcheck: ##################FALLEN   D E F EN D E R ________________________________________ ========================================  F A L L E N    H E R O E S
