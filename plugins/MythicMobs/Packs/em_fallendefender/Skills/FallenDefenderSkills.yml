# PROXIMITY CHECKERS - Determine if the hero should stop running upon revelant contact. Runner protocol only.

fdefender_runproximitycheck:
  Conditions:
  - hasaura{n=castatk6fdefender} false
  - targetwithin{d=5} castinstead fdefender_runproximitycheckb
  - incombat orElseCast fdefender_runproximitycheck_nocombat 
  - variableInRange{var=caster.runstacks;value=<1} castinstead fdefender_runproximitycheckc
  Skills:
  - variablesubtract{var=caster.runstacks;amount=1} @self 0.8

fdefender_runproximitycheckb:
  Conditions:
  - targetwithin{d=2.6} true
  - hasaura{n=castatk6fdefender} false
  - variableEquals{var=caster.running;value="2"} false
  Skills:
  - skill{s=[
    - auraremove{aura=checkrunfdefender2} @self
    - auraremove{aura=checkrunfdefender2b} @self
    - setvariable{var=caster.running;value="0";t=integer} @Self
    - setvariable{var=caster.runstacks;value="0";t=integer} @Self
    - state{state=run_stop;coldown=4;li=1;lo=4;speed=1} @self
    - potion{type=SLOW;duration=8;level=5;p=false;force=true} @Self
    - DefaultState{type=WALK;state=walk;li=3;lo=2;frame=0;cooldown=2} @self
    - setspeed{speed=1.4;type=walking} @Self];sync=true} @self 0.25 ############## 0.25
fdefender_runproximitycheck_nocombat:
  Cooldown: 3
  Conditions:
  - incombat false
  Skills:
    - auraremove{aura=checkrunfdefender2} @self
    - auraremove{aura=checkrunfdefender2b} @self
    - setvariable{var=caster.running;value="0";t=integer} @Self
    - setvariable{var=caster.runstacks;value="0";t=integer} @Self
    - state{state=run_stop;coldown=4;li=1;lo=4;speed=1.2} @self
    - potion{type=SLOW;duration=8;level=5;p=false;force=true} @Self
    - DefaultState{type=WALK;state=walk;li=3;lo=2;frame=0;cooldown=2} @self
    - setspeed{speed=1.4;type=walking} @Self
fdefender_runproximitycheckb2:
  Conditions:
  - targetwithin{d=13} true
  - hasaura{n=castatk6fdefender} false
  - variableEquals{var=caster.running;value="2"} false
  Skills:
  - skill{s=run_roll_fdefender;sync=true} @Target 0.7 ############
fdefender_runproximitycheckc:
  Conditions:
  - variableEquals{var=caster.running;value="2"} castinstead fdefender_ravagerun_stop
  Skills:
  - auraremove{aura=checkrunfdefender2} @self
  - auraremove{aura=checkrunfdefender2b} @self
  - effect:particles{particle=reddust;color=#e2eb32;amount=15;hS=0.1;vS=0.1;size=0.8;repeat=2;repeatinterval=1} @Origin{y=2.4} 0 #DEBUG
  - setvariable{var=caster.running;value="0";t=integer} @Self
  - setvariable{var=caster.runstacks;value="0";t=integer} @Self
  - state{state=run_stop;coldown=4;li=1;lo=4;speed=1.2} @self
  - potion{type=SLOW;duration=8;level=5;p=false;force=true} @Self
  - DefaultState{type=WALK;state=walk;li=3;lo=2;frame=0;cooldown=2} @self
  - setspeed{speed=1.4;type=walking} @self

