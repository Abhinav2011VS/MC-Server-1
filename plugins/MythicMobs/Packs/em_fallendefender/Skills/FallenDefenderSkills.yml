fdefender_runprotocolcheck:
  Conditions:
  - targetwithin{d=4} false
  - variableEquals{var=caster.running;value="2"} false
  - variableEquals{var=caster.shielding;value="1"} false
  - variableEquals{var=caster.svorden;value="1"} false
  - incombat true
  Skills:
  - skill{s=fdefender_runprotocol_addstacks;sync=true} 
  - randomskill{s=fdefender_runprotocol_start;sync=true} @Target 1
fdefender_runprotocol_addstacks:
  Conditions:
  - hasaura{n=checkrunfdefender2} false
  Skills:
  - variableadd{var=caster.runstacks;amount=1} @self 0.9
  - variableadd{var=caster.runstacks;amount=1} @self 0.4 ?variableInRange{var=caster.runstacks;value=>4}
  - variableadd{var=caster.runstacks;amount=1} @self 0.7 ?targetnotwithin{d=9}
  - variableadd{var=caster.runstacks;amount=1} @self 0.56 ?targetnotwithin{d=14}
fdefender_runprotocol_start:
  Conditions:
  - variableInRange{var=caster.runstacks;value=>13} true
  - hasaura{n=checkrunfdefender2} false
  - variableEquals{var=caster.shielding;value="1"} false
  Skills:
  - skill{s=fdefender_ravageprotocol;sync=true} @Self <60% 0.3
  - setvariable{var=caster.running;value="1";t=integer} @Self ?!variableEquals{var=caster.running;value="2"}
  - DefaultState{type=WALK;state=run;li=3;lo=2;frame=0;cooldown=2} @self ?!variableEquals{var=caster.running;value="2"}
  - setspeed{speed=1.9;type=walking} @Self ?!variableEquals{var=caster.running;value="2"}
  - Aura{auraName=checkrunfdefender2;onTick=fdefender_runproximitycheck;interval=15;duration=99999} @self
  - Aura{auraName=fdefender_ravageprotocol_aura;onTick=fdefender_ravageprotocol;interval=15;duration=60} @self <50% #RAVAGEPROTOCOL START  
  - Aura{auraName=checkoutrunfdefender;onTick=fdefender_OUTrunproximitycheck;interval=22;duration=99999;delay=3} @self #OUTRUN PROTOCOL
  - Aura{auraName=checkrunfdefender2b;onTick=fdefender_runproximitycheckb2;interval=20;duration=99999} @self #ROLL CHECK
  - delay <random.20to40> #xd

