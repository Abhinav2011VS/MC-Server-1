defenderfallen:
  Type: skeleton
  Display: 'Fallen Defender'
  AIGoalSelectors:
  Modules:
    ThreatTable: true
  AITargetSelectors:
  - 0 clear
  - 1 SpecificFaction CorruptedFlesh
  - 2 SpecificFaction Zombie
  - 3 attacker
  - 4 players
  AIGoalSelectors:
  - 0 clear
  Health: 350
  BossBar:
    Enabled: true
    Title: '&cFallen Defender'
    Range: 40
    Color: GREEN
    Style: SEGMENTED_20
  Faction: FallenHero
  DamageModifiers:
  - FIRE 0
  - MAGIC 1.1
  - PROJECTILE 0.25
  Damage: 12 #10 is the BASE damage. Setting it to 20 will DOUBLE damage. Setting it to 5 will REDUCE damage in 50% from the original.
  KillMessages:
  - '<target.name> was killed by the fallen heroes.'
  - 'The fallen heroes have claimed justice over <target.name>.'
  - "<target.name> suffered the revenge of the fallen heroes."
  - "The fallen heroes have claimed <target.name>'s soul."
  - '<target.name> tried to defy the fallen heroes. Tried.'
  Equipment:
  - air:4
  - air:3
  - air:2
  - imbootsfallen:1
  - iron_axe:0
  - air:5
  Drops:
  - exp 100-250 1
  - exp 100-250 1
  - exp 100-250 1
  - exp 100-250 1
  - exp 100-250 1
  - exp 100-250 1
  - exp 100-250 1
  - exp 100-250 1
  Skills:
  - potion{type=SLOW;duration=40;level=200;p=false;delay=0;force=true} @Self ~onSpawn
  - message{m="Hitrec <caster.var.hitrec> STACKS"} @PlayersNearOrigin{r=75} ~onDamaged 0 #DEBUG
  - message{m="Shieldstax <caster.var.shieldstacks> STACKS"} @PlayersNearOrigin{r=75} ~onDamaged 0 #DEBUG
#====== MODEL ASSIGNEMENT =============
  - model{mid=fallendefender;s=idle;n=false} @self ~onSpawn 1
  - bindhitbox{m=fallendefender;p=ob_shieldenn;t=defender_shieldennbox;delay=2} @self ~onSpawn
  - hitboxconfig{m=fallendefender;p=ob_shieldenn;pass=0;delay=2} @self ~onSpawn
  - DefaultState{type=IDLE;state=idlestatic;li=3;lo=2;n=false;frame=0} @self ~onSpawn 0
  - bodyclamp{c=0} @self ~onSpawn
#  - bodyclamp{maxhead=0;maxbody=0} @self ~onSpawn
  - RunAIGoalSelector{goal=clear} @self ~onSpawn
#  - spin{d=1;v=10} @self ~onSpawn
  - state{s=idlestatic;li=0;lo=0;n=false;delay=1} @self ~onSpawn
  - partvisibility{p=lame;v=false;delay=1} @self ~onspawn
  - submodel{mid=fallendefender;subpartid=shield2;remove=true} @self ~onSpawn
  - submodel{mid=fallendefender;subpartid=shieldennfx;remove=true} @self ~onSpawn
  - submodel{mid=fallendefender;subpartid=ob_forcefield;remove=true} @self ~onSpawn
  - submodel{mid=fallendefender;subpartid=ob_shallowfield;remove=true} @self ~onSpawn
  - submodel{mid=fallendefender;subpartid=shieldenndeployfx;remove=true} @self ~onSpawn
  - submodel{mid=fallendefender;partid=fravager_chipcitums;submodelid=fallendefender;subpartid=fravager_chipcitums;remove=true} @self ~onSpawn
  - submodel{mid=fallendefender;partid=svorden;submodelid=fallendefender;subpartid=sfe_effects;remove=true} @self ~onSpawn
  - submodel{mid=fallendefender;partid=svorden;submodelid=fallendefender;subpartid=sfe_frame0;remove=true} @self ~onSpawn
  - bindhitbox{m=fallendefender;p=ob_shallowfield;t=defender_shallowfield;delay=2} @self 0
  - hitboxconfig{m=fallendefender;p=ob_shallowfield;pass=0;delay=2} @self 0
  #GENDER
  - setvariable{var=caster.eichpee;value="<caster.mhp>";t=integer} @Self ~onSpawn
  - setvariable{var=caster.gender;value="1";t=integer} @Self ~onSpawn

  # ENTER COMBAT DFSTATES
  - DefaultState{type=WALK;state=walk;li=5;lo=2} @self ~onEnterCombat ?!variableEquals{var=caster.svorden;value="1"} ?!variableEquals{var=caster.shielding;value="1"}
  - DefaultState{type=IDLE;state=idle_combat;li=5;lo=2} @self ~onEnterCombat ?!variableEquals{var=caster.svorden;value="1"} ?!variableEquals{var=caster.shielding;value="1"}

  - DefaultState{type=WALK;state=walk_unsheathed;li=5;lo=2} @self ~onEnterCombat ?variableEquals{var=caster.svorden;value="1"} ?!variableEquals{var=caster.shielding;value="1"}
  - DefaultState{type=IDLE;state=idle_unsheathed;li=5;lo=2} @self ~onEnterCombat ?variableEquals{var=caster.svorden;value="1"} ?!variableEquals{var=caster.shielding;value="1"}
  - DefaultState{type=WALK;state=walk_block;li=5;lo=2} @self ~onEnterCombat ?variableEquals{var=caster.shielding;value="1"}
  - DefaultState{type=IDLE;state=idle_blocking;li=5;lo=2} @self ~onEnterCombat ?variableEquals{var=caster.shielding;value="1"}

  #LEAVE COMBAT DFSTATES 
  
  - DefaultState{type=WALK;state=walk;li=5;lo=2} @self ~onDropCombat ?!variableEquals{var=caster.svorden;value="1"}
  - DefaultState{type=IDLE;state=idle;li=8;lo=2;delay=60} @self ~onDropCombat ?!variableEquals{var=caster.svorden;value="1"}
  - DefaultState{type=WALK;state=walk_unsheathed;li=5;lo=2} @self ~onDropCombat ?variableEquals{var=caster.svorden;value="1"}
  - DefaultState{type=IDLE;state=idle_unsheathed;li=5;lo=2} @self ~onDropCombat ?variableEquals{var=caster.svorden;value="1"}
