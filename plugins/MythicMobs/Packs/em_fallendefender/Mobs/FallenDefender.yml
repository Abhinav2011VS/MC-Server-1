  - changepart{m=fallendefender;pid=right_arm;nm=fallendefender2;npid=right_arm} @self ~onSpawn
  - changepart{m=fallendefender;pid=right_forearm;nm=fallendefender2;npid=right_forearm} @self ~onSpawn
  - changepart{m=fallendefender;pid=left_arm;nm=fallendefender2;npid=left_arm} @self ~onSpawn
