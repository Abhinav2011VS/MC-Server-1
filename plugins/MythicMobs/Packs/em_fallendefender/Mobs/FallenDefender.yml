  - changepart{m=fallendefender;pid=right_leg;nm=fallendefender2;npid=right_leg} @self ~onSpawn
  - changepart{m=fallendefender;pid=right_shin;nm=fallendefender2;npid=right_shin} @self ~onSpawn
