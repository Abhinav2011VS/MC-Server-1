  - setvariable{var=caster.combor;value="0";t=integer} @Self ~onSpawn
  - setvariable{var=caster.comboa;value="0";t=integer} @Self ~onSpawn

  - CancelEvent{sync=true} @self ~onAttack 1 #CANCEL ATTACKS

  - randomskill{s=meleefdefendertrigger;sync=true} @Target ~onAttack >0% 1
  - randomskill{s=meleefdefendertrigger;sync=true} @LivingInCone{a=45.0;r=4.5;rot=0.0;ignore=samefaction} ~onTimer:13 0.85
  - randomskill{s=meleefdefendertrigger;sync=true} @LivingInCone{a=45.0;r=2.8;rot=0.0;ignore=samefaction} ~onTimer:10 1
  - randomskill{s=meleefdefendertrigger2;sync=true} @LivingInCone{a=110.0;r=6;rot=0.0;ignore=samefaction} ~onTimer:15 0.6 ########## 0.6
  
  - randomskill{s=attack4fdefender,attack5fdefender,attack4fdefender,attack5fdefender,cutslash_fdefender;sync=true} @LivingInCone{a=110.0;r=27;rot=0.0;ignore=samefaction} ~onTimer:77 0.45 ###### 0.6
  - randomskill{s=bruttack1_fdefender,bruttack1_fdefender;sync=true} @LivingInCone{a=110.0;r=6.5;rot=0.0;ignore=samefaction} ~onTimer:37 0.5 ###### 0.6
