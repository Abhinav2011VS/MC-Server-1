  - randomskill{s=fdefender_fireprojectile_vert,fdefender_fireprojectile_vert,attack5fdefender,attack4fdefender,cutslash_fdefender;sync=true} @LivingInCone{a=110.0;r=35;rot=0.0;ignore=samefaction} ~onTimer:77 0.45 ?variableEquals{var=caster.svorden;value="1"}
  - randomskill{s=meleefdefendertriggerSvorden2;sync=true} @LivingInCone{a=160.0;r=54;rot=0.0;ignore=samefaction} ~onTimer:30 0.9 ?variableEquals{var=caster.svorden;value="1"} ########## 0.6

