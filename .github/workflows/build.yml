name: Deploy Minecraft Server

on:
  push:
    branches:
      - master

jobs:
  start-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget screen

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Verify Java Installation
        run: java -version

      - name: Verify Server File
        run: ls -l server.jar

      - name: Start Minecraft Server
        run: |
          echo "Starting Minecraft server..."

          # Start the commit loop in the background
          nohup bash -c 'while true; do
            git fetch origin master && git reset --hard origin/master || { echo "Fetch or reset failed, skipping..."; true; }
  
            git add --all
            git commit -am "Auto-update server changes" --allow-empty -q || echo "Git commit failed"
  
            for i in {1..3}; do
            git push -f && break || { echo "Push failed, retrying... ($i)"; sleep 5; }
            done || echo "Push failed after multiple attempts"

            sleep 180
          done' &

          # Start the Minecraft server with optimized flags for performance
          screen -dmS minecraft_server /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/21.0.4-7/x64/bin/java \
          -Xmx12G -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 \
          -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch \
          -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M \
          -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 \
          -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 \
          -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem \
          -XX:MaxTenuringThreshold=1 -Daikars.new.flags=true -Dusing.aikars.flags=https://mcutils.com \
          -jar server.jar --nogui &

          # Save server state periodically
          nohup bash -c 'while true; do
            echo "Saving server..."
            screen -S minecraft_server -p 0 -X stuff "save-all\n"
            echo "Server saved!"
            sleep 300
          done' &

          # Wait for the server to run for a set duration (e.g., 5 hours)
          sleep 18000
          echo "Stopping Minecraft server..."

          for i in {60..1}; do
            screen -S minecraft_server -p 0 -X stuff "say Server will restart in $i seconds\n"
            sleep 1
          done

          screen -S minecraft_server -p 0 -X stuff "say Server restarting...\n"

          # Stop the server gracefully
          screen -S minecraft_server -p 0 -X stuff "stop\n"
          sleep 30

          # Stop the commit loop
          pkill -f "bash -c 'while true; do git add --all; git commit -m"

          # Pull latest changes before final commit
          echo "Pulling latest changes..."
          git fetch origin master && git reset --hard origin/master || { echo "Fetch failed, skipping..."; true; }

          # Final commit to capture all changes
          git add --all
          git commit -m "Final commit after server stop" --allow-empty || echo "Final commit failed"
          git push -f || echo "Final git push failed"
